<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python 3-Tier Architecture Demo</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; color: #333; }
        .form-group { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; background: #f8f9fa; padding: 1.5rem; border-radius: 8px; border: 1px solid #dee2e6; }
        input, textarea { padding: 0.75rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 0.75rem; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        button:hover { background: #218838; }
        .data-card { background: #e9ecef; padding: 1rem; margin-bottom: 0.75rem; border-radius: 6px; border-left: 4px solid #007bff; }
        .timestamp { color: #6c757d; font-size: 0.85rem; margin-top: 0.5rem; display: block; }
    </style>
</head>
<body>

    <h2>Submit Data to RDS</h2>
    <form id="dataForm" class="form-group">
        <input type="text" id="name" placeholder="Enter your name" required>
        <textarea id="message" rows="3" placeholder="Enter your message" required></textarea>
        <button type="submit">Save to Database</button>
    </form>

    <h2>Recent Database Records</h2>
    <div id="recentData">Loading records...</div>

    <script>
        document.getElementById('dataForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const message = document.getElementById('message').value;
            const btn = e.target.querySelector('button');
            
            btn.textContent = 'Saving...';
            btn.disabled = true;

            await fetch('/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, message })
            });
            
            document.getElementById('dataForm').reset();
            btn.textContent = 'Save to Database';
            btn.disabled = false;
            fetchRecentData(); 
        });

        async function fetchRecentData() {
            try {
                const response = await fetch('/api/recent');
                const data = await response.json();
                const container = document.getElementById('recentData');
                container.innerHTML = '';
                
                if(data.length === 0) return container.innerHTML = '<p>No records found in the database.</p>';

                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'data-card';
                    // Format the timestamp cleanly
                    const date = new Date(item.created_at).toLocaleString();
                    div.innerHTML = `<strong>${item.name}</strong><br>${item.message} <span class="timestamp">${date}</span>`;
                    container.appendChild(div);
                });
            } catch (error) {
                document.getElementById('recentData').innerHTML = '<p style="color:red;">Error connecting to backend.</p>';
            }
        }

        fetchRecentData();
    </script>
</body>
</html>
